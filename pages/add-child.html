<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Child</title>

    <link rel="stylesheet" href="../css/styles.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body class="auth-body">
    <div id="navbar"></div>
    <div class="auth-container">
      <a href="dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
      </a>

      <div class="auth-card">
        <h2>Add a Child</h2>

        <form id="childForm">
          <div class="form-group">
            <label>Full Name *</label>
            <input
              type="text"
              id="name"
              required
              placeholder="Child's full name"
            />
          </div>

          <div class="form-group">
            <label>Date of Birth *</label>
            <input type="date" id="dob" required />
          </div>

          <div class="form-group">
            <label>Experience Level *</label>

            <select id="level">
              <option value="beginner">Beginner</option>
              <option value="some-experience">Some Experience</option>
              <option value="confident">Confident</option>
            </select>
          </div>

          <div class="form-group">
            <label>Medical Notes</label>

            <textarea
              id="medical"
              placeholder="Allergies, conditions etc"
              rows="3"
            ></textarea>
          </div>

          <div class="form-group">
            <label>Safety Notes</label>

            <textarea
              id="safety"
              placeholder="Any safety concerns"
              rows="3"
            ></textarea>
          </div>

          <div class="form-group">
            <label>Daily Nap Times (max 3)</label>

            <div id="napContainer"></div>

            <button type="button" id="addNap" class="btn small">Add Nap</button>
          </div>

          <button type="submit" class="btn primary full">Add Child</button>
        </form>
      </div>
    </div>
    <div id="footer"></div>
    <script src="../js/layout.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../add-child.js"></script>
  </body>
</html>
